name: Weekly AI digest issue

on:
  workflow_dispatch:
  schedule:
    # 07:00 every Monday in Asia/Seoul.
    - cron: "0 22 * * 0"

permissions:
  contents: read
  issues: write

jobs:
  create-digest-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e .

      - name: Show workflow commit
        run: |
          echo "GITHUB_SHA=${GITHUB_SHA}"
          git rev-parse HEAD
          git log --oneline -1

      - name: Generate GitHub issue body
        env:
          PYTHONUTF8: "1"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5-mini' }}
          AZURE_OPENAI_ENDPOINT: ${{ vars.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ vars.AZURE_OPENAI_DEPLOYMENT || 'gpt-5-mini' }}
          DIGEST_CHANNEL_LABEL: AI마스터
        run: aimstletter --dry-run --output-format github > digest.md

      - name: Validate GitHub issue body format
        run: |
          echo "Generated digest preview:"
          sed -n '1,80p' digest.md

          python - <<'PY'
          from pathlib import Path

          text = Path("digest.md").read_text(encoding="utf-8")
          required = [
              "# AI마스터 주간 AI 업데이트",
              "## 상위 5개: DBA/네트워크/서버 직군 관련 AI 스킬",
              "## 하위 5개: 기타 AI 동향 및 비즈니스 모델 참고",
              "## 1.",
              "- **유형:**",
              "- **비즈니스 관점:**",
              "## 이번 주 토론 제안",
          ]
          missing = [marker for marker in required if marker not in text]
          if missing:
              raise SystemExit(f"Digest Markdown format check failed. Missing: {missing}")
          PY

      - name: Create weekly digest issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="AI마스터 주간 AI 업데이트 - $(TZ=Asia/Seoul date +'%Y-%m-%d')"
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "$title" \
            --body-file digest.md

      - name: Publish Naver Blog post
        env:
          NAVER_BLOG_ID: ${{ vars.NAVER_BLOG_ID || 'storm0710' }}
          NAVER_BLOG_USERNAME: ${{ secrets.NAVER_BLOG_USERNAME || 'storm0710' }}
          NAVER_BLOG_API_PASSWORD: ${{ secrets.NAVER_BLOG_API_PASSWORD }}
        run: |
          if [ -z "$NAVER_BLOG_ID" ] || [ -z "$NAVER_BLOG_USERNAME" ] || [ -z "$NAVER_BLOG_API_PASSWORD" ]; then
            echo "Naver Blog secrets are not configured. Skipping Naver Blog publishing."
            exit 0
          fi

          title="AI마스터 주간 AI 업데이트 - $(TZ=Asia/Seoul date +'%Y-%m-%d')"
          python -m aimstletter.naver_blog \
            --title "$title" \
            --body-file digest.md
