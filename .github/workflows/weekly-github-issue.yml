name: Weekly AI digest issue

on:
  workflow_dispatch:
  schedule:
    # 09:00 every Wednesday in Asia/Seoul.
    - cron: "0 0 * * 3"

permissions:
  contents: read
  issues: write

jobs:
  create-digest-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e .

      - name: Generate GitHub issue body
        env:
          AZURE_OPENAI_ENDPOINT: ${{ vars.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ vars.AZURE_OPENAI_DEPLOYMENT || 'gpt-5-mini' }}
          DIGEST_CHANNEL_LABEL: AI마스터
        run: aimstletter --dry-run --output-format github > digest.md

      - name: Create weekly digest issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="AI마스터 주간 AI 업데이트 - $(TZ=Asia/Seoul date +'%Y-%m-%d')"
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "$title" \
            --body-file digest.md
