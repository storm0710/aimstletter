name: Weekly AI magazine site

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/weekly-pages.yml"
      - "public/**"
      - "src/**"
      - "pyproject.toml"
  workflow_dispatch:
  schedule:
    # 09:05 every Wednesday in Asia/Seoul.
    - cron: "5 0 * * 3"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e .

      - name: Build AI magazine site
        env:
          PYTHONUTF8: "1"
          DIGEST_CHANNEL_LABEL: AIMST Letter
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5-mini' }}
          AZURE_OPENAI_ENDPOINT: ${{ vars.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ vars.AZURE_OPENAI_DEPLOYMENT || 'gpt-5-mini' }}
          SITE_ANALYTICS_PROVIDER: ${{ vars.SITE_ANALYTICS_PROVIDER }}
          SITE_ANALYTICS_ID: ${{ vars.SITE_ANALYTICS_ID }}
          SITE_ANALYTICS_DOMAIN: ${{ vars.SITE_ANALYTICS_DOMAIN }}
        run: aimstletter-site --output-dir public

      - name: Preserve weekly archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f public/archive
          if git diff --cached --quiet; then
            echo "No archive changes to preserve."
          else
            git commit -m "Preserve weekly site archive"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
